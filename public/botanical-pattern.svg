<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <filter id="wc1" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="wc2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="wc3" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Fondo crema -->
  <rect width="1440" height="900" fill="#EDE7DC"/>

  <!-- ====== MANCHAS ACUARELA SAGE GREEN ====== -->

  <!-- Mancha principal grande — blob izquierdo-centro -->
  <path d="M 80,500 C 40,380 100,200 250,180 C 350,165 420,240 500,210
           C 600,175 680,120 780,180 C 860,230 870,320 840,400
           C 810,480 760,540 700,570 C 620,610 520,630 420,610
           C 300,585 140,600 80,500 Z"
        fill="#7A9B8A" opacity="0.42" filter="url(#wc1)"/>

  <!-- Mancha secundaria — overlay más oscuro, ligeramente desplazado -->
  <path d="M 200,520 C 160,420 220,280 340,260 C 440,245 520,310 600,280
           C 680,250 740,200 820,260 C 880,305 875,390 840,450
           C 800,510 730,550 650,565 C 540,585 300,610 200,520 Z"
        fill="#5F8070" opacity="0.28" filter="url(#wc2)"/>

  <!-- Mancha pequeña acento — arriba izquierda -->
  <path d="M 60,220 C 40,160 90,100 160,110 C 220,118 260,160 240,210
           C 220,255 160,270 110,255 C 75,244 70,265 60,220 Z"
        fill="#7A9B8A" opacity="0.32" filter="url(#wc2)"/>

  <!-- Mancha tonal izquierda baja -->
  <path d="M 30,700 C 10,640 50,570 120,560 C 190,550 240,600 220,660
           C 200,715 140,740 80,730 C 40,723 45,745 30,700 Z"
        fill="#6B8C7C" opacity="0.3" filter="url(#wc2)"/>

  <!-- ====== FLOR GRANDE DERECHA ====== -->
  <g transform="translate(1090,280)">
    <!-- Pétalos grandes — solo contorno, muy translúcido -->
    <g fill="none" stroke="#C8C0B0" stroke-width="1.2" opacity="0.65">
      <!-- Pétalo 1 -->
      <path d="M0,0 C-30,-40 -40,-100 -10,-160 C10,-180 30,-180 40,-160 C60,-110 50,-50 0,0 Z"/>
      <!-- Pétalo 2 rotado 72° -->
      <path d="M0,0 C-30,-40 -40,-100 -10,-160 C10,-180 30,-180 40,-160 C60,-110 50,-50 0,0 Z" transform="rotate(72)"/>
      <!-- Pétalo 3 -->
      <path d="M0,0 C-30,-40 -40,-100 -10,-160 C10,-180 30,-180 40,-160 C60,-110 50,-50 0,0 Z" transform="rotate(144)"/>
      <!-- Pétalo 4 -->
      <path d="M0,0 C-30,-40 -40,-100 -10,-160 C10,-180 30,-180 40,-160 C60,-110 50,-50 0,0 Z" transform="rotate(216)"/>
      <!-- Pétalo 5 -->
      <path d="M0,0 C-30,-40 -40,-100 -10,-160 C10,-180 30,-180 40,-160 C60,-110 50,-50 0,0 Z" transform="rotate(288)"/>
    </g>
    <!-- Relleno pétalos muy tenue -->
    <g fill="#F5F0E8" opacity="0.3">
      <path d="M0,0 C-30,-40 -40,-100 -10,-160 C10,-180 30,-180 40,-160 C60,-110 50,-50 0,0 Z"/>
      <path d="M0,0 C-30,-40 -40,-100 -10,-160 C10,-180 30,-180 40,-160 C60,-110 50,-50 0,0 Z" transform="rotate(72)"/>
      <path d="M0,0 C-30,-40 -40,-100 -10,-160 C10,-180 30,-180 40,-160 C60,-110 50,-50 0,0 Z" transform="rotate(144)"/>
      <path d="M0,0 C-30,-40 -40,-100 -10,-160 C10,-180 30,-180 40,-160 C60,-110 50,-50 0,0 Z" transform="rotate(216)"/>
      <path d="M0,0 C-30,-40 -40,-100 -10,-160 C10,-180 30,-180 40,-160 C60,-110 50,-50 0,0 Z" transform="rotate(288)"/>
    </g>
    <!-- Centro de la flor — círculos concéntricos finos -->
    <circle r="30" fill="none" stroke="#C4A882" stroke-width="0.8" opacity="0.6"/>
    <circle r="20" fill="none" stroke="#C4A882" stroke-width="0.8" opacity="0.5"/>
    <circle r="10" fill="#C4A882" opacity="0.35"/>
    <!-- Estambres finos -->
    <g stroke="#C4A882" stroke-width="0.7" opacity="0.5">
      <line x1="0" y1="-10" x2="0" y2="-28"/><circle cx="0" cy="-30" r="2" fill="#C4A882"/>
      <line x1="9" y1="-5" x2="24" y2="-14"/><circle cx="26" cy="-15" r="2" fill="#C4A882"/>
      <line x1="9" y1="5" x2="24" y2="14"/><circle cx="26" cy="15" r="2" fill="#C4A882"/>
      <line x1="0" y1="10" x2="0" y2="28"/><circle cx="0" cy="30" r="2" fill="#C4A882"/>
      <line x1="-9" y1="5" x2="-24" y2="14"/><circle cx="-26" cy="15" r="2" fill="#C4A882"/>
      <line x1="-9" y1="-5" x2="-24" y2="-14"/><circle cx="-26" cy="-15" r="2" fill="#C4A882"/>
    </g>
  </g>

  <!-- ====== FLOR PEQUEÑA IZQUIERDA ====== -->
  <g transform="translate(220,160)" opacity="0.7">
    <g fill="none" stroke="#B8B0A0" stroke-width="1" opacity="0.6">
      <path d="M0,0 C-15,-22 -20,-55 -5,-80 C5,-90 15,-90 22,-75 C32,-55 25,-25 0,0 Z"/>
      <path d="M0,0 C-15,-22 -20,-55 -5,-80 C5,-90 15,-90 22,-75 C32,-55 25,-25 0,0 Z" transform="rotate(72)"/>
      <path d="M0,0 C-15,-22 -20,-55 -5,-80 C5,-90 15,-90 22,-75 C32,-55 25,-25 0,0 Z" transform="rotate(144)"/>
      <path d="M0,0 C-15,-22 -20,-55 -5,-80 C5,-90 15,-90 22,-75 C32,-55 25,-25 0,0 Z" transform="rotate(216)"/>
      <path d="M0,0 C-15,-22 -20,-55 -5,-80 C5,-90 15,-90 22,-75 C32,-55 25,-25 0,0 Z" transform="rotate(288)"/>
    </g>
    <circle r="14" fill="none" stroke="#C4A882" stroke-width="0.8" opacity="0.5"/>
    <circle r="6" fill="#C4A882" opacity="0.3"/>
  </g>

  <!-- ====== HOJAS ====== -->

  <!-- Hoja grande izquierda central -->
  <g transform="translate(340,520) rotate(-20)" opacity="0.75">
    <path d="M0,0 C-25,-50 -30,-130 0,-200 C30,-130 25,-50 0,0 Z" fill="#6B7A5A"/>
    <line x1="0" y1="0" x2="0" y2="-198" stroke="#5A6848" stroke-width="1.2"/>
    <line x1="0" y1="-50" x2="-22" y2="-90" stroke="#5A6848" stroke-width="0.8"/>
    <line x1="0" y1="-90" x2="20" y2="-128" stroke="#5A6848" stroke-width="0.8"/>
    <line x1="0" y1="-130" x2="-16" y2="-164" stroke="#5A6848" stroke-width="0.8"/>
    <line x1="0" y1="-165" x2="12" y2="-190" stroke="#5A6848" stroke-width="0.7"/>
  </g>

  <!-- Hoja grande derecha — detrás de la flor -->
  <g transform="translate(1050,380) rotate(25)" opacity="0.7">
    <path d="M0,0 C-20,-45 -25,-115 0,-170 C25,-115 20,-45 0,0 Z" fill="#6B7A5A"/>
    <line x1="0" y1="0" x2="0" y2="-168" stroke="#5A6848" stroke-width="1.2"/>
    <line x1="0" y1="-45" x2="-18" y2="-80" stroke="#5A6848" stroke-width="0.8"/>
    <line x1="0" y1="-90" x2="16" y2="-120" stroke="#5A6848" stroke-width="0.8"/>
    <line x1="0" y1="-130" x2="-12" y2="-155" stroke="#5A6848" stroke-width="0.7"/>
  </g>

  <!-- Hoja secundaria izquierda -->
  <g transform="translate(150,420) rotate(-35)" opacity="0.6">
    <path d="M0,0 C-15,-35 -18,-90 0,-130 C18,-90 15,-35 0,0 Z" fill="#7A8A5A"/>
    <line x1="0" y1="0" x2="0" y2="-128" stroke="#6A7848" stroke-width="1"/>
  </g>

  <!-- Hoja pequeña derecha baja -->
  <g transform="translate(1250,550) rotate(-15)" opacity="0.6">
    <path d="M0,0 C-12,-28 -14,-72 0,-105 C14,-72 12,-28 0,0 Z" fill="#6B7A5A"/>
    <line x1="0" y1="0" x2="0" y2="-103" stroke="#5A6848" stroke-width="0.9"/>
  </g>

  <!-- ====== LÍNEAS DORADAS ====== -->

  <!-- Línea dorada principal — gran curva ondulante -->
  <path d="M 300,650 C 380,580 450,520 550,500 C 650,480 720,510 800,480
           C 880,450 920,390 980,360 C 1020,340 1060,345 1090,360"
        fill="none" stroke="#C4A882" stroke-width="2.2" opacity="0.75" stroke-linecap="round"/>

  <!-- Espiral/curva dorada secundaria más pequeña -->
  <path d="M 420,580 C 460,540 500,520 540,530 C 575,540 590,560 580,590
           C 568,618 540,625 515,615"
        fill="none" stroke="#C4A882" stroke-width="1.4" opacity="0.6" stroke-linecap="round"/>

  <!-- Línea dorada fina de acento -->
  <path d="M 650,440 C 680,420 720,415 760,425 C 790,432 810,450 800,470"
        fill="none" stroke="#C4A882" stroke-width="1" opacity="0.5" stroke-linecap="round"/>

  <!-- ====== DETALLES FINOS ====== -->

  <!-- Círculo de contorno grande — detalle floral sutil fondo -->
  <circle cx="680" cy="380" r="120" fill="none" stroke="#A89880" stroke-width="0.6" opacity="0.25"/>
  <circle cx="680" cy="380" r="80" fill="none" stroke="#A89880" stroke-width="0.5" opacity="0.2"/>

  <!-- Puntos dorados dispersos -->
  <circle cx="520" cy="310" r="2.5" fill="#C4A882" opacity="0.5"/>
  <circle cx="540" cy="295" r="1.8" fill="#C4A882" opacity="0.4"/>
  <circle cx="505" cy="300" r="1.5" fill="#C4A882" opacity="0.35"/>
  <circle cx="850" cy="280" r="2" fill="#C4A882" opacity="0.45"/>
  <circle cx="865" cy="268" r="1.5" fill="#C4A882" opacity="0.35"/>
  <circle cx="910" cy="320" r="2" fill="#C4A882" opacity="0.4"/>

</svg>
